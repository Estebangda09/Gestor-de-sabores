<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ice Cream OS - Mis Tiendas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">
    <nav class="bg-slate-900 p-6 shadow-xl flex justify-between items-center text-white">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter text-blue-400">Puntos de Venta</h1>
        <button onclick="handleLogout()" class="bg-red-500/20 text-red-400 px-4 py-2 rounded-xl font-bold text-xs uppercase hover:bg-red-500 hover:text-white transition">Salir</button>
    </nav>

    <div class="max-w-5xl mx-auto p-10">
        <h2 id="welcome" class="text-4xl font-black text-slate-800 mb-10 uppercase tracking-tighter italic">Hola...</h2>
        <div id="suc-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <script>
        async function load() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) window.location.href = 'index.html';

            const { data: p } = await _supabase.from('perfiles').select('*').eq('id', session.user.id).single();
            document.getElementById('welcome').innerText = `Hola, ${p.username}`;

            const { data: vinc } = await _supabase.from('usuario_sucursales').select('sucursal_id').eq('usuario_id', session.user.id);
            const { data: sucs } = await _supabase.from('sucursales').select('*').in('id', vinc.map(v => v.sucursal_id));

            const list = document.getElementById('suc-list');
            if (sucs.length === 0) {
                list.innerHTML = `<p class="col-span-full text-center p-10 bg-white rounded-3xl font-bold text-slate-400">No tienes sucursales asignadas. Contacta al administrador.</p>`;
                return;
            }

            list.innerHTML = sucs.map(s => `
                <div class="bg-white p-8 rounded-[40px] shadow-lg hover:shadow-2xl transition-all border-b-[12px] border-blue-500 group">
                    <h3 class="text-2xl font-black mb-8 text-slate-800 uppercase italic">${s.nombre}</h3>
                    <button onclick="window.location.href='stock.html?id=${s.id}'" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black hover:bg-blue-600 transition-all uppercase tracking-widest text-sm">
                        GESTIONAR STOCK
                    </button>
                </div>
            `).join('');
        }
        load();
    </script>
</body>
</html>
