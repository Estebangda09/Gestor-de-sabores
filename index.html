<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Cream OS - Panel Maestro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fugaz+One&family=Inter:wght@400;700;900&family=Montserrat:wght@900&family=Oswald:wght@700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #0f172a; margin: 0; overflow-x: hidden; }
        
        /* Layout Admin */
        .sidebar { background: #1e293b; width: 280px; height: 100vh; position: fixed; color: white; z-index: 50; transition: 0.3s; }
        .main-content { margin-left: 280px; padding: 40px; min-height: 100vh; background: #f1f5f9; transition: 0.3s; }
        
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; padding: 15px !important; }
            .main-content { margin-left: 0; padding: 20px; }
        }

        .menu-item { padding: 12px 20px; cursor: pointer; border-radius: 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; color: #94a3b8; font-weight: bold; }
        .menu-item.active { background: #3b82f6; color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal.active { display: flex; }

        /* MODO TV - DISEÑO REFERENCIA */
        .tv-mode { 
            position: fixed; inset: 0; background: #fdfbf7; z-index: 9999; 
            overflow: hidden; display: flex; flex-direction: column; padding: 60px;
        }
        .tv-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; flex-grow: 1; align-content: start; }
        .tv-column { display: flex; flex-direction: column; gap: 40px; }
        
        .tv-cat-header { 
            font-size: 1.2rem; border-bottom: 1px solid rgba(0,0,0,0.1); 
            margin-bottom: 15px; padding-bottom: 5px; text-transform: lowercase; color: #64748b;
        }
        .tv-flavor-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; row-gap: 5px; }
        .tv-flavor-item { font-weight: 900; display: flex; align-items: center; gap: 10px; white-space: nowrap; }
        .tv-dot { color: #3b82f6; font-size: 1.5rem; line-height: 0; }
        
        .tv-ticker {
            position: absolute; bottom: 0; left: 0; width: 100%; background: #1e293b; 
            color: white; padding: 12px 0; font-weight: 900; text-transform: uppercase;
            overflow: hidden; white-space: nowrap; font-size: 1.4rem; font-style: italic;
        }
        .ticker-content { display: inline-block; animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translate(100%, 0); } 100% { transform: translate(-100%, 0); } }

        #login-screen { background: #0f172a; position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <!-- Pantalla de Login -->
    <div id="login-screen">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-96 text-center">
            <h2 class="text-3xl font-black mb-6 text-gray-800 italic uppercase">HELADO OS</h2>
            <input type="email" id="login-email" placeholder="Email" class="w-full border p-4 rounded-2xl mb-4 bg-gray-50 outline-none">
            <input type="password" id="login-pass" placeholder="Contraseña" class="w-full border p-4 rounded-2xl mb-6 bg-gray-50 outline-none">
            <button onclick="handleLogin()" id="btn-login" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">INGRESAR</button>
        </div>
    </div>

    <!-- Sidebar Admin -->
    <div id="sidebar" class="sidebar p-6 hidden">
        <h2 class="text-2xl font-black mb-10 text-blue-400 italic text-center uppercase">ADMIN PANEL</h2>
        <nav id="menu-nav"></nav>
        <button onclick="handleLogout()" class="mt-auto absolute bottom-8 left-6 text-red-400 font-bold flex items-center gap-2 hover:text-red-300 transition">✕ Salir</button>
    </div>

    <!-- Contenido Admin -->
    <div id="app" class="main-content hidden">
        <div id="view-header" class="flex justify-between items-center mb-10"></div>
        <div id="view-content"></div>
    </div>

    <!-- Contenedor TV -->
    <div id="tv-container" class="tv-mode hidden"></div>

    <!-- Modal con pestañas -->
    <div id="modal-form" class="modal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-2xl shadow-2xl relative overflow-y-auto max-h-[90vh]">
            <div class="flex gap-4 mb-6 border-b pb-2" id="modal-tabs">
                <button onclick="switchTab('config')" id="tab-config" class="font-bold text-blue-600 border-b-2 border-blue-600 pb-1">Configuración</button>
                <button onclick="switchTab('style')" id="tab-style" class="font-bold text-slate-400 pb-1">Editor de Estilo</button>
            </div>
            <h3 id="modal-title" class="text-2xl font-bold mb-6 text-gray-800 uppercase italic"></h3>
            <div id="modal-body" class="space-y-4"></div>
            <div class="flex justify-end gap-3 mt-8 border-t pt-6">
                <button onclick="closeModal()" class="px-5 font-bold text-slate-400 uppercase">Cancelar</button>
                <button id="btn-save" class="px-8 py-3 bg-blue-600 text-white rounded-2xl font-bold uppercase italic"></button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vokwutkpntqtfevvdkei.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZva3d1dGtwbnRxdGZldnZka2VpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3OTE4MDMsImV4cCI6MjA4OTM2NzgwM30.FdNLN4PdKAMe4LSdw9lGqjLeV6UzbfFlwZjgkd8nkro';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userPerfil = null;
        let currentPage = 'categorias';
        let currentTvData = null; // Para el editor de estilo

        // Detección modo TV
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'tv') {
            const tvId = urlParams.get('id');
            document.body.innerHTML = '<div id="tv-container" class="tv-mode"></div>';
            renderPantallaTV(tvId);
            setInterval(() => renderPantallaTV(tvId), 10000);
        } else {
            checkSession();
        }

        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return;
            const { data: perfil } = await _supabase.from('perfiles').select('*').eq('id', session.user.id).single();
            userPerfil = perfil;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('app').classList.remove('hidden');
            renderMenu();
            showPage('categorias');
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
            if (error) alert(error.message); else window.location.reload();
        }

        function handleLogout() { _supabase.auth.signOut().then(() => window.location.reload()); }

        function renderMenu() {
            const nav = document.getElementById('menu-nav');
            if (userPerfil.rol === 'admin') {
                nav.innerHTML = `
                    <div onclick="showPage('categorias')" id="m-categorias" class="menu-item">📁 Categorías</div>
                    <div onclick="showPage('sabores')" id="m-sabores" class="menu-item">🍨 Sabores</div>
                    <div onclick="showPage('sucursales')" id="m-sucursales" class="menu-item">🏪 Sucursales</div>
                    <div onclick="showPage('pantallas')" id="m-pantallas" class="menu-item">📺 Pantallas</div>
                    <div onclick="showPage('precios')" id="m-precios" class="menu-item">💰 Precios</div>
                `;
            } else {
                nav.innerHTML = `<div onclick="showPage('sucursales')" id="m-sucursales" class="menu-item active">🏪 Sucursales</div>`;
            }
        }

        async function showPage(page, params = null) {
            currentPage = page;
            const container = document.getElementById('view-content');
            const header = document.getElementById('view-header');
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            if(document.getElementById('m-'+page)) document.getElementById('m-'+page).classList.add('active');

            if (page === 'categorias') {
                header.innerHTML = `<h1 class="text-3xl font-black text-slate-800 uppercase italic">Categorías</h1><button onclick="abrirModal('cat')" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">+ Nueva</button>`;
                const { data } = await _supabase.from('categorias').select('*').order('orden');
                container.innerHTML = `<div class="space-y-3">${data.map(c => `<div class="bg-white p-5 rounded-2xl shadow-sm flex justify-between items-center border-l-8 border-blue-500 font-bold text-slate-700">${c.nombre} <div class="flex gap-4"><button onclick='abrirModal("cat", ${JSON.stringify(c)})' class="text-blue-500">Editar</button></div></div>`).join('')}</div>`;
            }

            if (page === 'sabores') {
                header.innerHTML = `<h1 class="text-3xl font-black text-slate-800 uppercase italic">Sabores</h1><button onclick="abrirModal('sabor')" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">+ Nuevo</button>`;
                const { data: cats } = await _supabase.from('categorias').select('*').order('orden');
                const { data: sabs } = await _supabase.from('sabores').select('*');
                container.innerHTML = cats.map(c => {
                    const ms = sabs.filter(s => s.categoria_id === c.id);
                    return `<div class="mb-8 bg-white p-6 rounded-3xl shadow-sm border-l-8 border-indigo-500"><h3 class="text-xl font-bold text-indigo-600 mb-6 uppercase tracking-widest text-sm">${c.nombre}</h3><div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    ${ms.map(s => `<div class="border-2 border-slate-50 p-4 rounded-2xl flex flex-col justify-between h-28 bg-slate-50 relative group">
                    <div class="flex gap-1 flex-wrap">${s.es_vegano ? '<span class="text-xs font-bold text-green-600">V</span>':''}${s.es_sintacc ? '<span class="text-xs font-bold text-amber-600">T</span>':''}</div><span class="font-bold text-slate-700 uppercase italic text-xs">${s.nombre}</span>
                    <div class="flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition"><button onclick='abrirModal("sabor", ${JSON.stringify(s)})' class="text-blue-500 font-bold text-[10px]">EDIT</button></div></div>`).join('')}</div></div>`;
                }).join('');
            }

            if (page === 'pantallas') {
                header.innerHTML = `<h1 class="text-3xl font-black text-slate-800 uppercase italic">Digital Signage</h1>`;
                const { data: sucs } = await _supabase.from('sucursales').select('*');
                container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">${sucs.map(s => `<div class="bg-white p-6 rounded-3xl shadow-lg border-l-8 border-blue-500"><h3 class="text-xl font-black text-slate-800 uppercase mb-4">${s.nombre}</h3><button onclick="verPantallasSucursal('${s.id}', '${s.nombre}')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold uppercase text-xs">PANTALLAS</button></div>`).join('')}</div>`;
            }

            if (page === 'sucursales') {
                header.innerHTML = `<h1 class="text-3xl font-black text-slate-800 uppercase italic">Sucursales</h1>`;
                const { data: sucs } = await _supabase.from('sucursales').select('*');
                container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-3 gap-6">${sucs.map(s => `<div class="bg-white p-6 rounded-3xl shadow-lg border-t-8 border-blue-500 text-center"><h3 class="text-xl font-black mb-4 uppercase italic text-slate-800">${s.nombre}</h3><button onclick="showPage('admin_stock', '${s.id}')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-black text-xs hover:bg-blue-600 transition">GESTIONAR STOCK</button></div>`).join('')}</div>`;
            }

            if (page === 'admin_stock') {
                const sucId = params;
                const { data: suc } = await _supabase.from('sucursales').select('nombre').eq('id', sucId).single();
                const { data: cats } = await _supabase.from('categorias').select('*').order('orden');
                const { data: sabs } = await _supabase.from('sabores').select('*');
                const { data: vis } = await _supabase.from('visibilidad_sabores').select('*').eq('sucursal_id', sucId);
                header.innerHTML = `<div class="flex items-center gap-4"><button onclick="showPage('sucursales')" class="text-slate-400 text-2xl">←</button><h1 class="text-3xl font-black text-slate-800 italic uppercase">${suc.nombre}</h1></div>`;
                container.innerHTML = cats.map(c => {
                    const ms = sabs.filter(s => s.categoria_id === c.id);
                    if(!ms.length) return '';
                    return `<div class="mb-10 bg-white p-8 rounded-[40px] shadow-sm"><div class="flex justify-between items-center mb-6"><h4 class="font-black text-slate-800 uppercase text-lg italic">${c.nombre}</h4><div class="flex gap-2"><button onclick="masterStock('${sucId}', ${JSON.stringify(ms.map(m=>m.id))}, true)" class="text-[10px] bg-emerald-100 text-emerald-600 px-3 py-1 rounded-full font-bold">HABILITAR TODO</button><button onclick="masterStock('${sucId}', ${JSON.stringify(ms.map(m=>m.id))}, false)" class="text-[10px] bg-red-100 text-red-600 px-3 py-1 rounded-full font-bold">PAUSAR TODO</button></div></div><div class="grid grid-cols-2 md:grid-cols-4 gap-3">${ms.map(s => { const isOk = vis.find(v => v.sabor_id === s.id)?.disponible !== false; return `<button onclick="toggleStock('${sucId}', '${s.id}', ${isOk})" class="p-5 rounded-2xl border-2 font-bold transition-all ${isOk ? 'bg-white border-blue-500 text-blue-700 shadow-md':'bg-slate-100 border-transparent text-slate-400 line-through'}">${s.nombre}</button>`; }).join('')}</div></div>`;
                }).join('');
            }
        }

        async function masterStock(sucId, ids, status) {
            const batch = ids.map(id => ({ sucursal_id: sucId, sabor_id: id, disponible: status }));
            await _supabase.from('visibilidad_sabores').upsert(batch);
            showPage('admin_stock', sucId);
        }

        // --- GESTIÓN DE TVs CON EDITOR ---
        async function verPantallasSucursal(sucId, sucName) {
            const container = document.getElementById('view-content');
            const header = document.getElementById('view-header');
            header.innerHTML = `<div class="flex items-center gap-4"><button onclick="showPage('pantallas')" class="text-slate-400 text-2xl">←</button><h1 class="text-3xl font-black text-slate-800 italic uppercase">TVs: ${sucName}</h1></div><button onclick="abrirModalPantalla('${sucId}')" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">+ NUEVA TV</button>`;
            const { data: pants } = await _supabase.from('pantallas').select('*').eq('sucursal_id', sucId);
            container.innerHTML = `<div class="grid gap-4">${pants.map(p => {
                const url = `${window.location.origin}${window.location.pathname}?mode=tv&id=${p.id}`;
                return `<div class="bg-white p-6 rounded-3xl shadow-sm flex justify-between items-center border-2 border-slate-100"><div><p class="font-black text-slate-700 text-lg uppercase italic">${p.nombre}</p><input type="text" readonly value="${url}" class="text-[9px] text-slate-400 bg-slate-50 p-2 rounded mt-2 w-64 border-none outline-none"></div><div class="flex gap-3"><button onclick="window.open('${url}', '_blank')" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-[10px]">VER</button><button onclick='abrirModalPantalla("${sucId}", ${JSON.stringify(p)})' class="bg-slate-900 text-white px-4 py-2 rounded-xl font-bold text-[10px]">EDITAR DISEÑO</button><button onclick="eliminar('pantallas','${p.id}')" class="text-red-300 font-bold text-xs">✕</button></div></div>`;
            }).join('')}</div>`;
        }

        async function abrirModalPantalla(sucId, data = null) {
            currentTvData = data;
            const { data: cats } = await _supabase.from('categorias').select('*').order('orden');
            const { data: precios } = await _supabase.from('precios_globales').select('*').order('orden');
            
            const body = document.getElementById('modal-body');
            const btn = document.getElementById('btn-save');
            document.getElementById('modal-title').innerText = data ? "EDITOR DE TV" : "NUEVA PANTALLA";
            btn.innerText = "GUARDAR CAMBIOS";
            
            document.getElementById('modal-tabs').classList.toggle('hidden', !data);
            document.getElementById('modal-form').classList.add('active');
            
            switchTab('config', cats, precios);
        }

        function switchTab(tab, cats = [], precios = []) {
            const body = document.getElementById('modal-body');
            const configActiva = currentTvData?.config_categorias || [];
            const estilo = currentTvData?.estilo || { 
                font: 'Inter', 
                catColor: '#64748b', 
                saborColor: '#1e293b', 
                catSize: '1.2', 
                saborSize: '1.6',
                bg: '#fdfbf7' 
            };

            document.getElementById('tab-config').className = tab === 'config' ? 'font-bold text-blue-600 border-b-2 border-blue-600 pb-1' : 'font-bold text-slate-400 pb-1';
            document.getElementById('tab-style').className = tab === 'style' ? 'font-bold text-blue-600 border-b-2 border-blue-600 pb-1' : 'font-bold text-slate-400 pb-1';

            if (tab === 'config') {
                body.innerHTML = `
                    <input id="p-nom" value="${currentTvData?.nombre || ''}" placeholder="Nombre TV" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none">
                    <select id="p-tipo" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none" onchange="toggleContentList(this.value)">
                        <option value="sabores" ${currentTvData?.tipo === 'sabores' ? 'selected':''}>Sabores</option>
                        <option value="precios" ${currentTvData?.tipo === 'precios' ? 'selected':''}>Precios</option>
                    </select>
                    <div id="content-list" class="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto p-2 bg-slate-50 rounded-2xl border"></div>
                `;
                
                window.toggleContentList = async (val) => {
                    const { data: items } = val === 'sabores' ? await _supabase.from('categorias').select('*').order('orden') : await _supabase.from('precios_globales').select('*').order('orden');
                    document.getElementById('content-list').innerHTML = items.map(i => `
                        <label class="flex items-center gap-2 p-2 bg-white rounded-xl"><input type="checkbox" class="tv-check" value="${i.id}" ${configActiva.includes(i.id) ? 'checked' : ''}> <span class="text-[10px] font-bold uppercase">${i.nombre || i.label}</span></label>
                    `).join('');
                };
                toggleContentList(currentTvData?.tipo || 'sabores');
            } else {
                body.innerHTML = `
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-xs font-bold uppercase">Tipografía</label>
                        <select id="s-font" class="w-full border p-3 rounded-xl bg-slate-50">
                            <option value="Inter" ${estilo.font === 'Inter' ? 'selected':''}>Inter (Moderna)</option>
                            <option value="Oswald" ${estilo.font === 'Oswald' ? 'selected':''}>Oswald (Condensada)</option>
                            <option value="Montserrat" ${estilo.font === 'Montserrat' ? 'selected':''}>Montserrat (Pesada)</option>
                        </select></div>
                        <div><label class="text-xs font-bold uppercase">Color Fondo</label><input type="color" id="s-bg" value="${estilo.bg}" class="w-full h-12 rounded-xl"></div>
                        <div><label class="text-xs font-bold uppercase">Color Categoría</label><input type="color" id="s-catC" value="${estilo.catColor}" class="w-full h-12 rounded-xl"></div>
                        <div><label class="text-xs font-bold uppercase">Color Sabores</label><input type="color" id="s-sabC" value="${estilo.saborColor}" class="w-full h-12 rounded-xl"></div>
                        <div><label class="text-xs font-bold uppercase">Tamaño Cat (rem)</label><input type="number" step="0.1" id="s-catS" value="${estilo.catSize}" class="w-full border p-3 rounded-xl"></div>
                        <div><label class="text-xs font-bold uppercase">Tamaño Sabor (rem)</label><input type="number" step="0.1" id="s-sabS" value="${estilo.saborSize}" class="w-full border p-3 rounded-xl"></div>
                    </div>
                `;
            }

            document.getElementById('btn-save').onclick = async () => {
                const isConfig = document.getElementById('p-nom') !== null;
                let row = {};
                
                if (isConfig) {
                    row = {
                        sucursal_id: currentTvData?.sucursal_id || urlParams.get('id'), // Fallback si es nueva
                        nombre: document.getElementById('p-nom').value,
                        tipo: document.getElementById('p-tipo').value,
                        config_categorias: Array.from(document.querySelectorAll('.tv-check:checked')).map(c => c.value)
                    };
                } else {
                    row = {
                        estilo: {
                            font: document.getElementById('s-font').value,
                            bg: document.getElementById('s-bg').value,
                            catColor: document.getElementById('s-catC').value,
                            saborColor: document.getElementById('s-sabC').value,
                            catSize: document.getElementById('s-catS').value,
                            saborSize: document.getElementById('s-sabS').value
                        }
                    };
                }

                if(currentTvData) await _supabase.from('pantallas').update(row).eq('id', currentTvData.id);
                else await _supabase.from('pantallas').insert([row]);
                
                closeModal();
                if(currentTvData) verPantallasSucursal(currentTvData.sucursal_id, 'Refrescando...');
            };
        }

        // --- RENDER TV DINÁMICO ---
        async function renderPantallaTV(id) {
            const { data: pant } = await _supabase.from('pantallas').select('*').eq('id', id).single();
            if(!pant) return;
            const style = pant.estilo || { font: 'Inter', bg: '#fdfbf7', catColor: '#64748b', saborColor: '#1e293b', catSize: '1.2', saborSize: '1.6' };
            const tv = document.getElementById('tv-container');
            tv.classList.remove('hidden');
            tv.style.backgroundColor = style.bg;
            tv.style.fontFamily = style.font;

            if (pant.tipo === 'precios') {
                const { data: precios } = await _supabase.from('precios_globales').select('*').in('id', pant.config_categorias || []).order('orden');
                tv.innerHTML = `
                    <div class="flex flex-col h-full justify-center max-w-5xl mx-auto w-full">
                        ${precios.map(p => `
                            <div class="price-row">
                                <span class="price-label" style="font-size:${style.catSize}rem; color:${style.catColor}">${p.label}</span>
                                <span class="price-value" style="font-size:${style.saborSize}rem; color:${style.saborColor}">$${p.valor}</span>
                            </div>`).join('')}
                    </div>
                    <div class="tv-ticker"><div class="ticker-content">CALIDAD AL ALCANCE DE TODOS • DISFRUTÁ NUESTROS HELADOS ARTESANALES •</div></div>`;
            } else {
                const { data: cats } = await _supabase.from('categorias').select('*').in('id', pant.config_categorias || []).order('orden');
                const { data: sabs } = await _supabase.from('sabores').select('*');
                const { data: vis } = await _supabase.from('visibilidad_sabores').select('*').eq('sucursal_id', pant.sucursal_id);
                
                let html = `<div class="tv-layout">`;
                const mid = Math.ceil(cats.length / 2);
                const cols = [cats.slice(0, mid), cats.slice(mid)];

                cols.forEach(colCats => {
                    html += `<div class="tv-column">`;
                    colCats.forEach(c => {
                        const disponibles = sabs.filter(s => s.categoria_id === c.id).filter(s => {
                            const v = vis.find(v => v.sabor_id === s.id);
                            return v ? v.disponible !== false : true;
                        });
                        if(disponibles.length) {
                            html += `<div class="tv-cat-header" style="font-size:${style.catSize}rem; color:${style.catColor}">${c.nombre}</div>
                                     <div class="tv-flavor-list">
                                     ${disponibles.map(s => `<div class="tv-flavor-item" style="font-size:${style.saborSize}rem; color:${style.saborColor}">
                                        <span class="tv-dot">•</span> ${s.nombre} 
                                        ${s.es_sintacc ? '<span class="text-amber-600 ml-1">T</span>':''} 
                                        ${s.es_vegano ? '<span class="text-green-600 ml-1">V</span>':''}
                                     </div>`).join('')}</div>`;
                        }
                    });
                    html += `</div>`;
                });
                html += `</div><div class="tv-ticker"><div class="ticker-content">Esto fue realizado por Estebandido •</div></div>`;
                tv.innerHTML = html;
            }
        }

        async function abrirModal(type, data = null) {
            const body = document.getElementById('modal-body');
            const btn = document.getElementById('btn-save');
            const title = document.getElementById('modal-title');
            document.getElementById('modal-tabs').classList.add('hidden');
            document.getElementById('modal-form').classList.add('active');
            body.innerHTML = '';
            title.innerText = (data ? "EDITAR " : "NUEVO ") + type.toUpperCase();
            btn.innerText = "GUARDAR";

            if (type === 'cat') {
                body.innerHTML = `<input id="f-nom" value="${data?.nombre || ''}" placeholder="Nombre" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none">`;
                btn.onclick = async () => { await _supabase.from('categorias').upsert({ id: data?.id, nombre: document.getElementById('f-nom').value }); closeModal(); showPage('categorias'); };
            }
            if (type === 'sabor') {
                const { data: cats } = await _supabase.from('categorias').select('*');
                body.innerHTML = `<input id="f-nom" value="${data?.nombre || ''}" placeholder="Nombre" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none"><select id="f-cat" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none">${cats.map(c => `<option value="${c.id}" ${data?.categoria_id === c.id ? 'selected':''}>${c.nombre}</option>`)}</select><div class="flex gap-4 p-2 font-bold"><label><input type="checkbox" id="f-veg" ${data?.es_vegano ? 'checked':''}> Vegano</label><label><input type="checkbox" id="f-tacc" ${data?.es_sintacc ? 'checked':''}> TACC</label></div>`;
                btn.onclick = async () => { await _supabase.from('sabores').upsert({ id: data?.id, nombre: document.getElementById('f-nom').value, categoria_id: document.getElementById('f-cat').value, es_vegano: document.getElementById('f-veg').checked, es_sintacc: document.getElementById('f-tacc').checked }); closeModal(); showPage('sabores'); };
            }
        }

        async function toggleStock(sucId, saborId, current) { await _supabase.from('visibilidad_sabores').upsert({ sucursal_id: sucId, sabor_id: saborId, disponible: !current }); showPage('admin_stock', sucId); }
        function closeModal() { document.getElementById('modal-form').classList.remove('active'); }
        async function eliminar(t, id) { if(confirm('¿BORRAR?')) { await _supabase.from(t).delete().eq('id', id); location.reload(); } }
    </script>
</body>
</html>
