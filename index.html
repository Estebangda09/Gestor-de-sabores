<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Heladería</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; }
        .sidebar { background: #1e293b; width: 260px; height: 100vh; position: fixed; color: white; }
        .main-content { margin-left: 260px; padding: 40px; min-height: 100vh; }
        .menu-item { padding: 12px 20px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
        .menu-item.active { background: #3b82f6; color: white; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <div class="sidebar p-6 shadow-xl">
        <h2 class="text-2xl font-black mb-8 text-blue-400">ICE CREAM ADMIN</h2>
        <nav>
            <div onclick="showPage('categorias')" id="m-categorias" class="menu-item active">📁 Categorías</div>
            <div onclick="showPage('sabores')" id="m-sabores" class="menu-item">🍨 Sabores</div>
            <div onclick="showPage('sucursales')" id="m-sucursales" class="menu-item">🏪 Sucursales</div>
            <div onclick="showPage('precios')" id="m-precios" class="menu-item">💰 Precios</div>
            <div onclick="showPage('visibilidad')" id="m-visibilidad" class="menu-item">👁️ Stock</div>
        </nav>
    </div>

    <div class="main-content">
        <div id="content-area"></div>
    </div>

    <div id="modal-form" class="modal">
        <div class="bg-white p-8 rounded-2xl w-[400px] shadow-2xl">
            <h3 id="modal-title" class="text-2xl font-bold mb-6"></h3>
            <div id="modal-body" class="space-y-4 text-gray-800">
                </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal()" class="px-5 py-2 text-gray-500">Cancelar</button>
                <button id="btn-save" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vokwutkpntqtfevvdkei.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZva3d1dGtwbnRxdGZldnZka2VpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3OTE4MDMsImV4cCI6MjA4OTM2NzgwM30.FdNLN4PdKAMe4LSdw9lGqjLeV6UzbfFlwZjgkd8nkro';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentPage = 'categorias';

        async function showPage(page) {
            currentPage = page;
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.getElementById('m-' + page).classList.add('active');
            const container = document.getElementById('content-area');
            container.innerHTML = "Cargando...";

            if (page === 'categorias') {
                const { data } = await _supabase.from('categorias').select('*').order('orden');
                container.innerHTML = `<div class="flex justify-between mb-6"><h1 class="text-3xl font-bold">Categorías</h1><button onclick="abrirModalCat()" class="bg-blue-600 text-white px-6 py-2 rounded-lg">+ Nueva</button></div>
                <div class="bg-white rounded-xl shadow p-4">${data.map(c => `<div class="flex justify-between border-b p-3"><span>${c.nombre}</span><button onclick="eliminar('categorias','${c.id}')" class="text-red-500">Eliminar</button></div>`).join('')}</div>`;
            }

            if (page === 'sabores') {
                const { data: sab } = await _supabase.from('sabores').select('*, categorias(nombre)');
                container.innerHTML = `<div class="flex justify-between mb-6"><h1 class="text-3xl font-bold">Sabores</h1><button onclick="abrirModalSabor()" class="bg-blue-600 text-white px-6 py-2 rounded-lg">+ Nuevo</button></div>
                <div class="bg-white rounded-xl shadow p-4">${sab.map(s => `<div class="flex justify-between border-b p-3"><span><b>${s.nombre}</b> (${s.categorias?.nombre || '--'})</span><button onclick="eliminar('sabores','${s.id}')" class="text-red-500">Eliminar</button></div>`).join('')}</div>`;
            }

            if (page === 'precios') {
                const { data } = await _supabase.from('precios_globales').select('*').order('orden');
                container.innerHTML = `<div class="flex justify-between mb-6"><h1 class="text-3xl font-bold">Precios</h1><button onclick="abrirModalPrecio()" class="bg-green-600 text-white px-6 py-2 rounded-lg">+ Nuevo Precio</button></div>
                <div class="bg-white rounded-xl shadow p-6 space-y-4">
                ${data.map(p => `<div class="flex gap-4 items-center">
                    <span class="w-1/3 font-bold">${p.label}</span>
                    <input type="number" value="${p.valor}" class="border p-2 rounded w-full" onchange="updatePrecio('${p.id}', this.value)">
                    <button onclick="eliminar('precios_globales','${p.id}')" class="text-red-400">✕</button>
                </div>`).join('')}</div>`;
            }

            if (page === 'sucursales') {
                const { data } = await _supabase.from('sucursales').select('*');
                container.innerHTML = `<div class="flex justify-between mb-6"><h1 class="text-3xl font-bold">Sucursales</h1><button onclick="abrirModalSucursal()" class="bg-blue-600 text-white px-6 py-2 rounded-lg">+ Nueva Sucursal</button></div>
                <div class="grid grid-cols-2 gap-4">${data.map(s => `<div class="bg-white p-4 rounded-xl shadow"><b>${s.nombre}</b><br><small>${s.id_texto}</small><br><button onclick="eliminar('sucursales','${s.id}')" class="text-red-500 mt-2">Eliminar</button></div>`).join('')}</div>`;
            }
        }

        // --- FUNCIONES DE APERTURA DE MODAL (ESPECÍFICAS) ---
        function abrirModalCat() {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "Nueva Categoría";
            body.innerHTML = `
                <input id="input-nombre" type="text" placeholder="Nombre (Ej: Cremas)" class="w-full border p-2 mb-2">
                <input id="input-orden" type="number" placeholder="Orden (Ej: 1)" class="w-full border p-2">`;
            document.getElementById('btn-save').onclick = async () => {
                const nom = document.getElementById('input-nombre').value;
                const ord = document.getElementById('input-orden').value;
                const { error } = await _supabase.from('categorias').insert([{ nombre: nom, orden: ord }]);
                if(error) alert("Error: " + error.message); else { closeModal(); showPage('categorias'); }
            };
            document.getElementById('modal-form').classList.add('active');
        }

        async function abrirModalSabor() {
            const { data: cats } = await _supabase.from('categorias').select('*');
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "Nuevo Sabor";
            body.innerHTML = `
                <input id="input-nombre" type="text" placeholder="Nombre Sabor" class="w-full border p-2 mb-2">
                <select id="select-cat" class="w-full border p-2">
                    ${cats.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('')}
                </select>`;
            document.getElementById('btn-save').onclick = async () => {
                const nom = document.getElementById('input-nombre').value;
                const cat = document.getElementById('select-cat').value;
                const { error } = await _supabase.from('sabores').insert([{ nombre: nom, categoria_id: cat }]);
                if(error) alert("Error: " + error.message); else { closeModal(); showPage('sabores'); }
            };
            document.getElementById('modal-form').classList.add('active');
        }

        function abrirModalSucursal() {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "Nueva Sucursal";
            body.innerHTML = `
                <input id="input-nombre" type="text" placeholder="Nombre Sucursal" class="w-full border p-2 mb-2">
                <input id="input-id" type="text" placeholder="ID Texto (ej: pacheco)" class="w-full border p-2">`;
            document.getElementById('btn-save').onclick = async () => {
                const nom = document.getElementById('input-nombre').value;
                const tid = document.getElementById('input-id').value;
                const { error } = await _supabase.from('sucursales').insert([{ nombre: nom, id_texto: tid }]);
                if(error) alert("Error: " + error.message); else { closeModal(); showPage('sucursales'); }
            };
            document.getElementById('modal-form').classList.add('active');
        }

        function abrirModalPrecio() {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "Nuevo Precio Global";
            body.innerHTML = `
                <input id="input-label" type="text" placeholder="Etiqueta (Ej: 1 KILO)" class="w-full border p-2 mb-2">
                <input id="input-valor" type="number" placeholder="Precio $" class="w-full border p-2 mb-2">
                <input id="input-orden" type="number" placeholder="Orden" class="w-full border p-2">`;
            document.getElementById('btn-save').onclick = async () => {
                const lab = document.getElementById('input-label').value;
                const val = document.getElementById('input-valor').value;
                const ord = document.getElementById('input-orden').value;
                const { error } = await _supabase.from('precios_globales').insert([{ label: lab, valor: val, orden: ord }]);
                if(error) alert("Error: " + error.message); else { closeModal(); showPage('precios'); }
            };
            document.getElementById('modal-form').classList.add('active');
        }

        async function updatePrecio(id, nuevoValor) {
            await _supabase.from('precios_globales').update({ valor: nuevoValor }).eq('id', id);
        }

        async function eliminar(tabla, id) {
            if(confirm("¿Seguro?")) {
                await _supabase.from(tabla).delete().eq('id', id);
                showPage(currentPage);
            }
        }

        function closeModal() { document.getElementById('modal-form').classList.remove('active'); }

        showPage('categorias');
    </script>
</body>
</html>v
