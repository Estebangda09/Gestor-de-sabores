<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Heladería</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f8f9fa; }
        .titulo-serif { font-family: 'Playfair Display', serif; }
        .sabor-item { transition: all 0.5s ease-in-out; }
    </style>
</head>
<body class="p-8">

    <div id="app" class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end border-b-2 border-gray-300 pb-4 mb-8">
            <h1 id="categoria-titulo" class="titulo-serif text-5xl text-gray-800">Cargando sabores...</h1>
            <img src="https://cdn-icons-png.flaticon.com/512/938/938063.png" class="h-16 opacity-20">
        </div>

        <div id="lista-sabores" class="grid grid-cols-1 md:grid-cols-2 gap-x-16 gap-y-4 text-2xl">
            </div>
    </div>

    <script>
        // 1. CONFIGURACIÓN (REEMPLAZA ESTO)
        const SUPABASE_URL = 'https://vokwutkpntqtfevvdkei.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_AI9d63P5TCq9pKV2AwCA_g_cKOL3fBw';

        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Obtener el ID de pantalla de la URL (ej: heladeria.html?id=1)
        const urlParams = new URLSearchParams(window.location.search);
        const idPantalla = urlParams.get('id') || 1;

        async function cargarSabores() {
            const { data, error } = await supabase
                .from('sabores')
                .select('*')
                .eq('pantalla_id', idPantalla)
                .eq('disponible', true);

            if (data) {
                renderizar(data);
            }
        }

        function renderizar(sabores) {
            const contenedor = document.getElementById('lista-sabores');
            const titulo = document.getElementById('categoria-titulo');
            
            // Personalizar título según pantalla
            titulo.innerText = idPantalla == 1 ? "Cremas y Frutales" : "Dulces de Leche y Especiales";

            contenedor.innerHTML = sabores.map(sabor => `
                <div class="flex justify-between items-baseline border-b border-dotted border-gray-400 pb-1 sabor-item">
                    <span class="font-medium text-gray-700">${sabor.nombre}</span>
                    <span class="text-gray-400 text-lg">$${sabor.precio || ''}</span>
                </div>
            `).join('');
        }

        // SUSCRIPCIÓN EN TIEMPO REAL
        supabase
            .channel('cambios')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'sabores' }, (payload) => {
                console.log('Hubo un cambio!', payload);
                cargarSabores();
            })
            .subscribe();

        // Carga inicial
        cargarSabores();
    </script>
</body>
</html>
