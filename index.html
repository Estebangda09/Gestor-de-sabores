<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Cream OS - Panel Maestro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fugaz+One&family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; margin: 0; overflow-x: hidden; }
        .sidebar { background: #1e293b; width: 280px; height: 100vh; position: fixed; color: white; z-index: 50; }
        .main-content { margin-left: 280px; padding: 40px; min-height: 100vh; background: #f1f5f9; }
        .menu-item { padding: 12px 20px; cursor: pointer; border-radius: 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; color: #94a3b8; font-weight: bold; }
        .menu-item.active { background: #3b82f6; color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; }
        .modal.active { display: flex; }
        
        /* Estilos Modo TV */
        .tv-mode { position: fixed; inset: 0; background: #0f172a; z-index: 9999; color: white; overflow: hidden; display: flex; flex-direction: column; }
        .tv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; flex-grow: 1; }
        .tv-card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .tv-title { font-family: 'Fugaz One', cursive; text-transform: uppercase; font-size: 3rem; color: #3b82f6; }
        .tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 6px; font-weight: 900; margin-left: 5px; text-transform: uppercase; }
        .tag-veg { background: #22c55e; color: #052e16; }
        .tag-tacc { background: #eab308; color: #422006; }
        
        #login-screen { background: #0f172a; position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <!-- Pantalla de Login -->
    <div id="login-screen">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-96 text-center">
            <h2 class="text-3xl font-black mb-2 text-gray-800 italic uppercase">Helado OS</h2>
            <input type="email" id="login-email" placeholder="Email" class="w-full border p-4 rounded-2xl mb-4 bg-gray-50 outline-none">
            <input type="password" id="login-pass" placeholder="Contraseña" class="w-full border p-4 rounded-2xl mb-4 bg-gray-50 outline-none text-gray-800">
            <button onclick="handleLogin()" id="btn-login" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">INGRESAR</button>
        </div>
    </div>

    <!-- Panel Admin -->
    <div id="sidebar" class="sidebar p-6 hidden">
        <h2 class="text-2xl font-black mb-10 text-blue-400 italic text-center uppercase">Helad OS</h2>
        <nav id="menu-nav"></nav>
        <button onclick="handleLogout()" class="mt-auto absolute bottom-8 left-6 text-red-400 font-bold">✕ Cerrar Sesión</button>
    </div>

    <div id="app" class="main-content hidden">
        <div id="view-header" class="flex justify-between items-center mb-10"></div>
        <div id="view-content"></div>
    </div>

    <!-- Vista TV (Oculta por defecto) -->
    <div id="tv-container" class="tv-mode hidden"></div>

    <!-- Modal General -->
    <div id="modal-form" class="modal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-lg shadow-2xl">
            <h3 id="modal-title" class="text-2xl font-bold mb-6 text-gray-800 italic uppercase"></h3>
            <div id="modal-body" class="space-y-4"></div>
            <div class="flex justify-end gap-3 mt-8 border-t pt-6">
                <button onclick="closeModal()" class="px-5 font-bold text-slate-400">CANCELAR</button>
                <button id="btn-save" class="px-8 py-3 bg-blue-600 text-white rounded-2xl font-bold shadow-lg uppercase italic"></button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vokwutkpntqtfevvdkei.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZva3d1dGtwbnRxdGZldnZka2VpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3OTE4MDMsImV4cCI6MjA4OTM2NzgwM30.FdNLN4PdKAMe4LSdw9lGqjLeV6UzbfFlwZjgkd8nkro';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userPerfil = null;
        let currentPage = 'categorias';

        // Detectar si es modo TV al cargar
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'tv') {
            document.body.innerHTML = '<div id="tv-container" class="tv-mode"></div>';
            renderPantallaTV(urlParams.get('id'));
            setInterval(() => renderPantallaTV(urlParams.get('id')), 15000);
        } else {
            checkSession();
        }

        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return;
            const { data: perfil } = await _supabase.from('perfiles').select('*').eq('id', session.user.id).single();
            userPerfil = perfil;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('app').classList.remove('hidden');
            renderMenu();
            showPage(userPerfil.rol === 'admin' ? 'categorias' : 'sucursales');
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
            if (error) alert(error.message); else window.location.reload();
        }

        function handleLogout() { _supabase.auth.signOut().then(() => window.location.reload()); }

        function renderMenu() {
            const nav = document.getElementById('menu-nav');
            let items = `<div onclick="showPage('sucursales')" id="m-sucursales" class="menu-item">🏪 Sucursales</div>`;
            if (userPerfil.rol === 'admin') {
                items = `
                    <div onclick="showPage('categorias')" id="m-categorias" class="menu-item active">📁 Categorías</div>
                    <div onclick="showPage('sabores')" id="m-sabores" class="menu-item">🍨 Sabores</div>
                    <div onclick="showPage('sucursales')" id="m-sucursales" class="menu-item">🏪 Sucursales</div>
                    <div onclick="showPage('pantallas')" id="m-pantallas" class="menu-item">📺 Pantallas</div>
                    <div onclick="showPage('usuarios')" id="m-usuarios" class="menu-item">👥 Usuarios</div>
                    <div onclick="showPage('precios')" id="m-precios" class="menu-item">💰 Precios</div>
                `;
            }
            nav.innerHTML = items;
        }

        async function showPage(page, params = null) {
            currentPage = page;
            const container = document.getElementById('view-content');
            const header = document.getElementById('view-header');
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            if(document.getElementById('m-'+page)) document.getElementById('m-'+page).classList.add('active');

            if (page === 'pantallas') {
                header.innerHTML = `<h1 class="text-3xl font-black text-slate-800 uppercase italic">Digital Signage</h1>`;
                const { data: sucs } = await _supabase.rpc('obtener_sucursales_por_permiso', { p_usuario_id: userPerfil.id, p_rol: userPerfil.rol });
                container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">${sucs.map(s => `
                    <div class="bg-white p-6 rounded-3xl shadow-lg border-l-8 border-blue-500">
                        <h3 class="text-xl font-black text-slate-800 uppercase mb-4">${s.nombre}</h3>
                        <button onclick="verPantallasSucursal('${s.id}', '${s.nombre}')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold uppercase text-xs">CONFIGURAR PANTALLAS</button>
                    </div>`).join('')}</div>`;
            }
            
            // Reutilizar lógica previa de categorías, sabores, sucursales...
            if (page === 'sucursales') {
                header.innerHTML = `<h1 class="text-3xl font-black text-slate-800 uppercase italic">Sucursales</h1>`;
                const { data: sucs } = await _supabase.rpc('obtener_sucursales_por_permiso', { p_usuario_id: userPerfil.id, p_rol: userPerfil.rol });
                container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-3 gap-6">${sucs.map(s => `
                    <div class="bg-white p-6 rounded-3xl shadow-lg border-t-8 border-blue-500 text-center">
                        <h3 class="text-xl font-black mb-4 uppercase italic text-slate-800">${s.nombre}</h3>
                        <button onclick="showPage('admin_stock', '${s.id}')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-black text-xs">GESTIONAR STOCK</button>
                    </div>`).join('')}</div>`;
            }

            if (page === 'admin_stock') {
                const sucId = params;
                const { data: suc } = await _supabase.from('sucursales').select('nombre').eq('id', sucId).single();
                const { data: cats } = await _supabase.from('categorias').select('*').order('orden');
                const { data: sabs } = await _supabase.from('sabores').select('*');
                const { data: vis } = await _supabase.from('visibilidad_sabores').select('*').eq('sucursal_id', sucId);
                header.innerHTML = `<div class="flex items-center gap-4"><button onclick="showPage('sucursales')" class="text-slate-400 text-2xl">←</button><h1 class="text-3xl font-black text-slate-800 italic">${suc.nombre}</h1></div>`;
                container.innerHTML = cats.map(c => {
                    const ms = sabs.filter(s => s.categoria_id === c.id);
                    if(!ms.length) return '';
                    return `<div class="mb-10"><h4 class="font-black text-blue-500 uppercase mb-4 ml-2 text-sm">${c.nombre}</h4><div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    ${ms.map(s => {
                        const isOk = vis.find(v => v.sabor_id === s.id)?.disponible !== false;
                        return `<button onclick="toggleStock('${sucId}', '${s.id}', ${isOk})" class="p-5 rounded-2xl border-2 font-bold ${isOk ? 'bg-white border-blue-500 text-blue-700':'bg-slate-200 border-transparent text-slate-400 line-through'}">${s.nombre}</button>`;
                    }).join('')}</div></div>`;
                }).join('');
            }
            
            // Módulo de Usuarios
            if (page === 'usuarios') {
                header.innerHTML = `<h1 class="text-3xl font-black text-slate-800 uppercase italic">Usuarios</h1><button onclick="abrirModal('usuario')" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">+ NUEVO</button>`;
                const { data: users } = await _supabase.from('perfiles').select('*');
                container.innerHTML = `<div class="grid gap-4">${users.map(u => `<div class="bg-white p-6 rounded-3xl shadow-sm flex justify-between items-center border-l-8 ${u.rol === 'admin' ? 'border-amber-400':'border-emerald-400'}">
                <div><p class="font-black text-slate-700 text-xl uppercase italic">${u.username}</p><p class="text-xs text-slate-400 font-bold uppercase">${u.rol}</p></div>
                <div class="flex gap-2"><button onclick='gestionarAccesos("${u.id}", "${u.username}")' class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-bold">PERMISOS</button><button onclick="eliminar('perfiles','${u.id}')" class="text-red-300 font-bold text-xs p-2">BORRAR</button></div></div>`).join('')}</div>`;
            }
        }

        // --- LÓGICA DE PANTALLAS ---
        async function verPantallasSucursal(sucId, sucName) {
            const container = document.getElementById('view-content');
            const header = document.getElementById('view-header');
            header.innerHTML = `<div class="flex items-center gap-4"><button onclick="showPage('pantallas')" class="text-slate-400 text-2xl">←</button><h1 class="text-3xl font-black text-slate-800 italic uppercase">TVs: ${sucName}</h1></div>
                                <button onclick="abrirModalPantalla('${sucId}')" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">+ NUEVA TV</button>`;
            const { data: pants } = await _supabase.from('pantallas').select('*').eq('sucursal_id', sucId);
            container.innerHTML = `<div class="grid gap-4">${pants.map(p => {
                const url = `${window.location.origin}${window.location.pathname}?mode=tv&id=${p.id}`;
                return `
                <div class="bg-white p-6 rounded-3xl shadow-sm flex justify-between items-center border-2 border-slate-100">
                    <div>
                        <p class="font-black text-slate-700 text-lg uppercase italic">${p.nombre}</p>
                        <p class="text-xs font-bold text-blue-500 uppercase">${p.tipo === 'precios' ? '📊 Lista de Precios' : '🍨 Menú Sabores'} (${p.orientacion})</p>
                        <input type="text" readonly value="${url}" class="text-[9px] text-slate-400 bg-slate-50 p-2 rounded mt-2 w-64 border-none">
                    </div>
                    <div class="flex gap-3">
                        <button onclick="window.open('${url}', '_blank')" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-[10px]">VER VISTA</button>
                        <button onclick="eliminar('pantallas','${p.id}')" class="text-red-300 font-bold text-xs">✕</button>
                    </div>
                </div>`;
            }).join('')}</div>`;
        }

        async function abrirModalPantalla(sucId) {
    const { data: cats } = await _supabase.from('categorias').select('*').order('orden');
    const body = document.getElementById('modal-body');
    const btn = document.getElementById('btn-save');
    const title = document.getElementById('modal-title');

    title.innerText = "NUEVA PANTALLA";
    btn.innerText = "CREAR TV";
    btn.disabled = false;

    body.innerHTML = `
        <div class="space-y-4">
            <input id="p-nom" placeholder="Nombre TV (ej: Mostrador Izquierdo)" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none focus:ring-2 ring-blue-500">
            <select id="p-tipo" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none" onchange="document.getElementById('cat-list-wrapper').style.display = (this.value === 'sabores' ? 'block' : 'none')">
                <option value="sabores">Menú de Sabores</option>
                <option value="precios">Lista de Precios</option>
            </select>
            <select id="p-ori" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none">
                <option value="16:9">Horizontal (16:9)</option>
                <option value="9:16">Vertical (9:16)</option>
            </select>
            <div id="cat-list-wrapper" class="space-y-2 pt-4">
                <p class="text-xs font-bold text-slate-400 uppercase italic">Categorías a mostrar:</p>
                <div class="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto p-2 bg-slate-50 rounded-2xl">
                    ${cats.map(c => `
                    <label class="flex items-center gap-2 p-2 bg-white rounded-xl cursor-pointer border border-transparent hover:border-blue-200">
                        <input type="checkbox" class="cat-check w-5 h-5 text-blue-600" value="${c.id}"> 
                        <span class="text-[10px] font-black uppercase text-slate-600">${c.nombre}</span>
                    </label>`).join('')}
                </div>
            </div>
        </div>
    `;

    document.getElementById('modal-form').classList.add('active');

    btn.onclick = async () => {
        const nombre = document.getElementById('p-nom').value;
        const tipo = document.getElementById('p-tipo').value;
        const orientacion = document.getElementById('p-ori').value;
        const config = Array.from(document.querySelectorAll('.cat-check:checked')).map(c => c.value);

        if (!nombre) return alert("Por favor, ponle un nombre a la pantalla.");
        if (tipo === 'sabores' && config.length === 0) return alert("Selecciona al menos una categoría para mostrar.");

        btn.innerText = "PROCESANDO...";
        btn.disabled = true;

        try {
            const { error } = await _supabase.from('pantallas').insert([{
                sucursal_id: sucId,
                nombre: nombre,
                tipo: tipo,
                orientacion: orientacion,
                config_categorias: config
            }]);

            if (error) throw error;

            alert("¡Pantalla creada con éxito!");
            closeModal();
            // Refrescamos la vista de pantallas de esta sucursal específica
            verPantallasSucursal(sucId, "Sucursal"); 

        } catch (err) {
            console.error("Error al crear pantalla:", err);
            alert("Error: " + err.message);
            btn.innerText = "CREAR TV";
            btn.disabled = false;
        }
    };
}

        // --- RENDERIZADO MODO TV ---
        async function renderPantallaTV(id) {
            const { data: pant } = await _supabase.from('pantallas').select('*').eq('id', id).single();
            if(!pant) return;
            const tv = document.getElementById('tv-container');
            
            if (pant.tipo === 'precios') {
                const { data: precios } = await _supabase.from('precios_globales').select('*').order('orden');
                tv.innerHTML = `
                    <div class="p-20 flex flex-col h-full justify-center">
                        <h1 class="tv-title mb-20 text-center">Nuestros Precios</h1>
                        <div class="space-y-12 max-w-5xl mx-auto w-full">
                            ${precios.map(p => `
                                <div class="flex justify-between items-end border-b-4 border-slate-800 pb-6">
                                    <span class="text-6xl font-black uppercase italic text-slate-400">${p.label}</span>
                                    <span class="text-8xl font-black text-blue-500">$${p.valor}</span>
                                </div>`).join('')}
                        </div>
                    </div>`;
            } else {
                const { data: cats } = await _supabase.from('categorias').select('*').in('id', pant.config_categorias).order('orden');
                const { data: sabs } = await _supabase.from('sabores').select('*');
                const { data: vis } = await _supabase.from('visibilidad_sabores').select('*').eq('sucursal_id', pant.sucursal_id);
                
                tv.innerHTML = `
                    <div class="p-10 flex flex-col h-full">
                        <header class="flex justify-between items-center mb-10 border-b-2 border-slate-800 pb-5">
                            <h1 class="tv-title">Nuestros Sabores</h1>
                            <div class="text-4xl font-black text-slate-600 italic uppercase">Artesanales</div>
                        </header>
                        <div class="tv-grid">
                            ${cats.map(c => {
                                const ms = sabs.filter(s => s.categoria_id === c.id);
                                return ms.map(s => {
                                    const available = vis.find(v => v.sabor_id === s.id)?.disponible !== false;
                                    if(!available) return '';
                                    return `
                                    <div class="tv-card">
                                        <span class="text-4xl font-black uppercase italic">${s.nombre}</span>
                                        <div class="flex">
                                            ${s.es_vegano ? '<span class="tag tag-veg">VEG</span>':''}
                                            ${s.es_sintacc ? '<span class="tag tag-tacc">TACC</span>':''}
                                        </div>
                                    </div>`;
                                }).join('');
                            }).join('')}
                        </div>
                    </div>`;
            }
        }

        async function toggleStock(sucId, saborId, current) {
            await _supabase.from('visibilidad_sabores').upsert({ sucursal_id: sucId, sabor_id: saborId, disponible: !current });
            showPage('admin_stock', sucId);
        }

        function closeModal() { document.getElementById('modal-form').classList.remove('active'); }
        async function eliminar(t, id) { if(confirm('¿BORRAR?')) { await _supabase.from(t).delete().eq('id', id); showPage(currentPage); } }
    </script>
</body>
</html>
