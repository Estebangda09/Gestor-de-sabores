<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Cream OS - Panel de Gestión</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .sidebar { background: #1e293b; width: 260px; height: 100vh; position: fixed; color: white; z-index: 50; }
        .main-content { margin-left: 260px; padding: 40px; min-height: 100vh; background: #f1f5f9; }
        .menu-item { padding: 12px 20px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .menu-item:hover { background: #334155; }
        .menu-item.active { background: #3b82f6; font-weight: 600; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; }
        .modal.active { display: flex; }
        .tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .tag-vegano { background: #dcfce7; color: #166534; }
        .tag-tacc { background: #fef9c3; color: #854d0e; }
        #login-screen { background: #0f172a; position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-96 text-center">
            <h2 class="text-3xl font-black mb-2 text-gray-800 italic uppercase italic">Ice Cream OS</h2>
            <p class="text-gray-400 mb-8 text-sm">Panel Administrativo</p>
            <input type="email" id="login-email" placeholder="Email" class="w-full border p-4 rounded-2xl mb-4 outline-none focus:ring-2 ring-blue-500 bg-gray-50">
            <input type="password" id="login-pass" placeholder="Contraseña" class="w-full border p-4 rounded-2xl mb-6 outline-none focus:ring-2 ring-blue-500 bg-gray-50">
            <button onclick="handleLogin()" id="btn-login" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all active:scale-95">Entrar al Sistema</button>
        </div>
    </div>

    <div id="sidebar" class="sidebar p-6 hidden">
        <h2 class="text-2xl font-black mb-10 text-blue-400">ADMIN OS</h2>
        <nav id="menu-nav"></nav>
        <button onclick="handleLogout()" class="mt-auto absolute bottom-8 left-6 text-red-400 font-bold flex items-center gap-2 hover:text-red-300">
            <span>✕</span> Cerrar Sesión
        </button>
    </div>

    <div id="app" class="main-content hidden">
        <div id="content-area"></div>
    </div>

    <div id="modal-form" class="modal">
        <div class="bg-white p-8 rounded-3xl w-[450px] shadow-2xl relative">
            <h3 id="modal-title" class="text-2xl font-bold mb-6 text-gray-800"></h3>
            <div id="modal-body" class="space-y-4"></div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal()" class="px-5 py-2 text-gray-500 font-semibold">Cancelar</button>
                <button id="btn-save" class="px-8 py-2 bg-blue-600 text-white rounded-xl font-bold">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DIRECTA PARA EVITAR ERRORES DE CARGA
        const SUPABASE_URL = 'https://vokwutkpntqtfevvdkei.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZva3d1dGtwbnRxdGZldnZka2VpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3OTE4MDMsImV4cCI6MjA4OTM2NzgwM30.FdNLN4PdKAMe4LSdw9lGqjLeV6UzbfFlwZjgkd8nkro';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userPerfil = null;

        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) {
                document.getElementById('login-screen').style.display = 'flex';
                return;
            }

            const { data: perfil, error } = await _supabase.from('perfiles').select('*').eq('id', session.user.id).single();
            
            if (error || !perfil) {
                alert("Error: No tienes un perfil creado en la tabla 'perfiles'.");
                handleLogout();
                return;
            }

            userPerfil = perfil;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('app').classList.remove('hidden');
            renderMenu();
            showPage('categorias');
        }

        async function handleLogin() {
            const btn = document.getElementById('btn-login');
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;

            if (!email || !pass) return alert("Completa los datos");

            btn.innerText = "CONECTANDO...";
            btn.disabled = true;

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });

            if (error) {
                alert("Fallo: " + error.message);
                btn.innerText = "Entrar al Sistema";
                btn.disabled = false;
            } else {
                window.location.reload(); // Recarga para limpiar cualquier error de JS previo
            }
        }

        function handleLogout() {
            _supabase.auth.signOut().then(() => {
                localStorage.clear();
                window.location.reload();
            });
        }

        function renderMenu() {
            const nav = document.getElementById('menu-nav');
            if (userPerfil.rol === 'admin') {
                nav.innerHTML = `
                    <div onclick="showPage('categorias')" id="m-categorias" class="menu-item active font-bold">📁 Categorías</div>
                    <div onclick="showPage('sabores')" id="m-sabores" class="menu-item">🍨 Sabores</div>
                    <div onclick="showPage('sucursales')" id="m-sucursales" class="menu-item">🏪 Sucursales</div>
                    <div onclick="showPage('precios')" id="m-precios" class="menu-item">💰 Precios</div>
                `;
            } else {
                nav.innerHTML = `<div class="menu-item active font-bold">🏪 Gestión de Stock</div>`;
            }
        }

        async function showPage(page, params = null) {
            const container = document.getElementById('content-area');
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            if(document.getElementById('m-'+page)) document.getElementById('m-'+page).classList.add('active');

            if (page === 'categorias') {
                const { data } = await _supabase.from('categorias').select('*').order('orden');
                container.innerHTML = `<div class="flex justify-between mb-8"><h1 class="text-3xl font-black text-slate-800">Categorías</h1><button onclick="abrirModal('cat')" class="bg-blue-600 text-white px-6 py-2 rounded-xl">+ Nueva</button></div>
                <div class="space-y-3">${data.map(c => `<div class="bg-white p-5 rounded-2xl shadow-sm flex justify-between border-l-8 border-blue-500">
                <span class="font-bold text-slate-700">${c.nombre} <span class="text-slate-300 ml-2">#${c.orden}</span></span>
                <div class="flex gap-4"><button onclick='abrirModal("cat", ${JSON.stringify(c)})' class="text-blue-500 font-bold">Editar</button><button onclick="eliminar('categorias','${c.id}')" class="text-red-400">Eliminar</button></div></div>`).join('')}</div>`;
            }

            if (page === 'sabores') {
                const { data: cats } = await _supabase.from('categorias').select('*').order('orden');
                const { data: sabs } = await _supabase.from('sabores').select('*');
                container.innerHTML = `<div class="flex justify-between mb-8"><h1 class="text-3xl font-black text-slate-800">Sabores</h1><button onclick="abrirModal('sabor')" class="bg-blue-600 text-white px-6 py-2 rounded-xl">+ Nuevo</button></div>`;
                cats.forEach(c => {
                    const misSabores = sabs.filter(s => s.categoria_id === c.id);
                    container.innerHTML += `<div class="mb-8 bg-white p-6 rounded-3xl shadow-sm border-l-8 border-indigo-500"><h3 class="text-xl font-bold text-indigo-600 mb-6">${c.nombre}</h3><div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    ${misSabores.map(s => `<div class="border-2 border-slate-100 p-4 rounded-2xl flex flex-col justify-between h-28 bg-slate-50 relative group">
                    <div class="flex gap-1 flex-wrap">${s.es_vegano ? '<span class="tag tag-vegano">Veg</span>':''}${s.es_sintacc ? '<span class="tag tag-tacc">TACC</span>':''}</div>
                    <span class="font-bold text-slate-700">${s.nombre}</span>
                    <div class="flex justify-end gap-2 text-[10px] opacity-0 group-hover:opacity-100 transition"><button onclick='abrirModal("sabor", ${JSON.stringify(s)})' class="text-blue-500 font-bold">EDIT</button><button onclick="eliminar('sabores','${s.id}')" class="text-red-400 font-bold">BORRAR</button></div></div>`).join('')}</div></div>`;
                });
            }

            if (page === 'sucursales') {
                const { data } = await _supabase.from('sucursales').select('*');
                container.innerHTML = `<h1 class="text-3xl font-black mb-8 text-slate-800">Sucursales</h1>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">${data.map(s => `<div class="bg-white p-6 rounded-3xl shadow-sm border-t-8 border-blue-500"><h3 class="text-xl font-black mb-6 text-slate-800">${s.nombre}</h3><button onclick="showPage('admin_stock', '${s.id}')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-md hover:bg-blue-700 transition">📦 Gestionar Stock</button>
                <div class="flex justify-between mt-6 px-2"><button onclick='abrirModal("sucursal", ${JSON.stringify(s)})' class="text-xs text-slate-400 font-bold uppercase">Editar</button><button onclick="eliminar('sucursales','${s.id}')" class="text-xs text-red-300 font-bold uppercase">Eliminar</button></div></div>`).join('')}</div>`;
            }

            if (page === 'admin_stock') {
                const sucId = params;
                const { data: suc } = await _supabase.from('sucursales').select('*').eq('id', sucId).single();
                const { data: cats } = await _supabase.from('categorias').select('*').order('orden');
                const { data: sabs } = await _supabase.from('sabores').select('*');
                const { data: vis } = await _supabase.from('visibilidad_sabores').select('*').eq('sucursal_id', sucId);

                container.innerHTML = `<div class="flex justify-between items-start mb-8"><div><h1 class="text-3xl font-black text-slate-800">${suc.nombre}</h1><p class="text-slate-400">Marca los sabores agotados</p></div>
                <div class="flex gap-2"><button onclick="bulkStock('${sucId}', true)" class="bg-green-500 text-white px-5 py-2 rounded-xl font-bold shadow-sm">Activar Todo</button><button onclick="bulkStock('${sucId}', false)" class="bg-red-500 text-white px-5 py-2 rounded-xl font-bold shadow-sm">Agotar Todo</button></div></div>`;

                cats.forEach(c => {
                    const misSabores = sabs.filter(s => s.categoria_id === c.id);
                    container.innerHTML += `<div class="mb-10"><h4 class="font-black text-blue-500 mb-4 ml-2 uppercase tracking-widest text-sm">${c.nombre}</h4><div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    ${misSabores.map(s => {
                        const isOk = vis.find(v => v.sabor_id === s.id)?.disponible !== false;
                        return `<button onclick="toggleStock('${sucId}', '${s.id}', ${isOk})" class="p-5 rounded-2xl border-2 font-bold shadow-sm transition-all active:scale-95 ${isOk ? 'bg-white border-blue-500 text-blue-700':'bg-slate-200 border-transparent text-slate-400 line-through'}">${s.nombre}</button>`;
                    }).join('')}</div></div>`;
                });
            }

            if (page === 'precios') {
                const { data } = await _supabase.from('precios_globales').select('*').order('orden');
                container.innerHTML = `<h1 class="text-3xl font-black mb-8 text-slate-800">Precios Globales</h1><div class="bg-white p-8 rounded-3xl shadow-sm max-w-xl">
                <button onclick="abrirModal('precio')" class="bg-blue-600 text-white px-5 py-2 rounded-xl mb-8 font-bold">+ Nuevo Precio</button>
                ${data.map(p => `<div class="flex items-center gap-4 mb-5 border-b border-slate-50 pb-5"><span class="w-1/3 font-bold text-slate-600 text-lg">${p.label}</span><input type="number" value="${p.valor}" onchange="updatePrecio('${p.id}', this.value)" class="border-2 p-3 rounded-xl w-full bg-slate-50 font-black text-blue-600 text-center">
                <button onclick='abrirModal("precio", ${JSON.stringify(p)})' class="text-blue-400">✏️</button></div>`).join('')}</div>`;
            }
        }

        async function abrirModal(type, data = null) {
            const body = document.getElementById('modal-body');
            const title = document.getElementById('modal-title');
            const btn = document.getElementById('btn-save');
            body.innerHTML = '';
            title.innerText = (data ? 'Editar ' : 'Nuevo ') + type.toUpperCase();
            document.getElementById('modal-form').classList.add('active');

            if (type === 'cat') {
                body.innerHTML = `<input id="f-nom" value="${data?.nombre || ''}" placeholder="Nombre" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none focus:ring-2 ring-blue-500"><input id="f-ord" type="number" value="${data?.orden || ''}" placeholder="Orden" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none focus:ring-2 ring-blue-500">`;
                btn.onclick = async () => {
                    const row = { nombre: document.getElementById('f-nom').value, orden: parseInt(document.getElementById('f-ord').value) };
                    if(data) await _supabase.from('categorias').update(row).eq('id', data.id);
                    else await _supabase.from('categorias').insert([row]);
                    closeModal(); showPage('categorias');
                };
            }
            if (type === 'sabor') {
                const { data: cats } = await _supabase.from('categorias').select('*');
                body.innerHTML = `<input id="f-nom" value="${data?.nombre || ''}" placeholder="Nombre" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none focus:ring-2 ring-blue-500"><select id="f-cat" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none focus:ring-2 ring-blue-500">${cats.map(c => `<option value="${c.id}" ${data?.categoria_id === c.id ? 'selected':''}>${c.nombre}</option>`)}</select>
                <div class="flex gap-6 p-2"><label class="flex items-center gap-2 font-bold text-green-700 cursor-pointer"><input type="checkbox" id="f-veg" ${data?.es_vegano ? 'checked':''}> Vegano</label><label class="flex items-center gap-2 font-bold text-yellow-600 cursor-pointer"><input type="checkbox" id="f-tacc" ${data?.es_sintacc ? 'checked':''}> Sin TACC</label></div>`;
                btn.onclick = async () => {
                    const row = { nombre: document.getElementById('f-nom').value, categoria_id: document.getElementById('f-cat').value, es_vegano: document.getElementById('f-veg').checked, es_sintacc: document.getElementById('f-tacc').checked };
                    if(data) await _supabase.from('sabores').update(row).eq('id', data.id);
                    else await _supabase.from('sabores').insert([row]);
                    closeModal(); showPage('sabores');
                };
            }
            if (type === 'sucursal') {
                body.innerHTML = `<input id="f-nom" value="${data?.nombre || ''}" placeholder="Nombre Sucursal" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none focus:ring-2 ring-blue-500"><input id="f-tid" value="${data?.id_texto || ''}" placeholder="pacheco" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none focus:ring-2 ring-blue-500">`;
                btn.onclick = async () => {
                    const row = { nombre: document.getElementById('f-nom').value, id_texto: document.getElementById('f-tid').value };
                    if(data) await _supabase.from('sucursales').update(row).eq('id', data.id);
                    else await _supabase.from('sucursales').insert([row]);
                    closeModal(); showPage('sucursales');
                };
            }
            if (type === 'precio') {
                body.innerHTML = `<input id="f-lab" value="${data?.label || ''}" placeholder="Etiqueta" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none focus:ring-2 ring-blue-500"><input id="f-val" type="number" value="${data?.valor || ''}" placeholder="Precio" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none focus:ring-2 ring-blue-500"><input id="f-ord" type="number" value="${data?.orden || ''}" placeholder="Orden" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none focus:ring-2 ring-blue-500">`;
                btn.onclick = async () => {
                    const row = { label: document.getElementById('f-lab').value, valor: parseFloat(document.getElementById('f-val').value), orden: parseInt(document.getElementById('f-ord').value) };
                    if(data) await _supabase.from('precios_globales').update(row).eq('id', data.id);
                    else await _supabase.from('precios_globales').insert([row]);
                    closeModal(); showPage('precios');
                };
            }
        }

        async function toggleStock(sucId, saborId, current) {
            await _supabase.from('visibilidad_sabores').upsert({ sucursal_id: sucId, sabor_id: saborId, disponible: !current });
            showPage('admin_stock', sucId);
        }

        async function bulkStock(sucId, estado) {
            await _supabase.rpc('bulk_update_stock', { pid_sucursal: sucId, p_estado: estado });
            showPage('admin_stock', sucId);
        }

        async function eliminar(tabla, id) { if(confirm('¿Eliminar?')) { await _supabase.from(tabla).delete().eq('id', id); showPage(currentPage); } }
        async function updatePrecio(id, val) { await _supabase.from('precios_globales').update({ valor: val }).eq('id', id); }
        function closeModal() { document.getElementById('modal-form').classList.remove('active'); }

        checkSession();
    </script>
</body>
</html>
