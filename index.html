<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Menús - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .menu-item.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .sidebar { background: #2d3748; width: 250px; height: 100vh; position: fixed; color: white; }
        .content { margin-left: 250px; padding: 25px; background: #f0f2f5; min-height: 100vh; }
    </style>
</head>
<body>

<div class="sidebar p-4">
    <div class="text-xl font-bold mb-8 italic">🍦 Sistema Menús</div>
    <nav class="space-y-2">
        <button onclick="showPage('categorias')" id="btn-categorias" class="menu-item w-full text-left p-3 rounded">📁 Categorías</button>
        <button onclick="showPage('sabores')" id="btn-sabores" class="menu-item w-full text-left p-3 rounded">🍨 Sabores</button>
        <button onclick="showPage('sucursales')" id="btn-sucursales" class="menu-item w-full text-left p-3 rounded">🏪 Sucursales</button>
        <button onclick="showPage('precios')" id="btn-precios" class="menu-item w-full text-left p-3 rounded">💰 Precios</button>
        <button onclick="showPage('visibilidad')" id="btn-visibilidad" class="menu-item w-full text-left p-3 rounded">👁️ Visibilidad</button>
    </nav>
</div>

<div class="content">
    <div class="bg-white p-6 rounded-xl shadow-lg mb-6 flex justify-between items-center">
        <h2 class="text-2xl font-bold" id="page-title">Panel Administrativo</h2>
        <button class="bg-red-400 text-white px-4 py-2 rounded-lg">Cerrar Sesión</button>
    </div>

    <div id="view-container" class="bg-white p-8 rounded-xl shadow-lg min-height-[500px]">
        </div>
</div>

<script>
    const SUPABASE_URL = 'https://vokwutkpntqtfevvdkei.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZva3d1dGtwbnRxdGZldnZka2VpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3OTE4MDMsImV4cCI6MjA4OTM2NzgwM30.FdNLN4PdKAMe4LSdw9lGqjLeV6UzbfFlwZjgkd8nkro';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function showPage(page) {
        // Actualizar UI del menú
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`btn-${page}`).classList.add('active');
        const container = document.getElementById('view-container');

        if (page === 'categorias') {
            const { data } = await _supabase.from('categorias').select('*').order('orden');
            container.innerHTML = `
                <h2 class="text-3xl font-bold mb-6">Gestión de Categorías</h2>
                <button class="bg-indigo-500 text-white px-6 py-2 rounded-lg mb-4">+ Nueva Categoría</button>
                <table class="w-full text-left">
                    <thead><tr class="border-b"><th>Nombre</th><th>Orden</th><th>Estado</th><th>Acciones</th></tr></thead>
                    <tbody>${data.map(c => `<tr class="border-b h-12"><td>${c.nombre}</td><td>${c.orden}</td><td><span class="bg-green-100 text-green-700 px-2 rounded">${c.estado}</span></td><td><button class="text-blue-500 mr-2">Editar</button><button class="text-red-500">Eliminar</button></td></tr>`).join('')}</tbody>
                </table>`;
        }

        if (page === 'precios') {
            const { data } = await _supabase.from('precios_globales').select('*');
            container.innerHTML = `
                <h2 class="text-3xl font-bold mb-6">Gestión de Precios</h2>
                <div class="grid grid-cols-2 gap-4">
                    ${data.map(p => `
                        <div>
                            <label class="block font-bold mb-1">${p.label}</label>
                            <input type="number" value="${p.valor}" class="border w-full p-2 rounded" id="price-${p.id}">
                        </div>`).join('')}
                </div>
                <button onclick="savePrices()" class="bg-indigo-500 text-white px-6 py-3 rounded-lg mt-6">Guardar Precios Globales</button>`;
        }

        if (page === 'visibilidad') {
            // Lógica para cargar sucursales y sus sabores con toggle
            const { data: sucs } = await _supabase.from('sucursales').select('*');
            container.innerHTML = `
                <h2 class="text-3xl font-bold mb-6">Control de Visibilidad</h2>
                <select id="sucursal-selector" onchange="loadVisBySuc(this.value)" class="border p-2 rounded mb-6 w-64">
                    <option>Seleccionar sucursal...</option>
                    ${sucs.map(s => `<option value="${s.id}">${s.nombre}</option>`).join('')}
                </select>
                <div id="vis-list"></div>`;
        }
    }

    async function savePrices() {
        // Lógica para recorrer los inputs y hacer update en la tabla precios_globales
        alert("Precios actualizados en Supabase");
    }

    // Carga inicial
    showPage('categorias');
</script>

</body>
</html>
