<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ice Cream OS - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
</head>
<body class="bg-[#0f172a] h-screen flex items-center justify-center font-sans">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-96 text-center">
        <h2 class="text-3xl font-black mb-2 text-gray-800 italic uppercase">Ice Cream OS</h2>
        <p class="text-gray-400 mb-8 text-sm font-bold uppercase tracking-widest">Acceso</p>
        
        <input type="email" id="email" placeholder="Email" class="w-full border p-4 rounded-2xl mb-4 outline-none focus:ring-2 ring-blue-500 bg-gray-50 text-gray-700">
        <input type="password" id="pass" placeholder="Contraseña" class="w-full border p-4 rounded-2xl mb-4 outline-none focus:ring-2 ring-blue-500 bg-gray-50 text-gray-700">
        
        <div class="flex items-center mb-6 px-2">
            <input type="checkbox" id="remember" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500">
            <label for="remember" class="ml-2 text-sm font-bold text-gray-500 cursor-pointer">Recordar usuario</label>
        </div>

        <button onclick="login()" id="btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all active:scale-95">INGRESAR</button>
    </div>

    <script>
        window.onload = () => {
            const savedEmail = localStorage.getItem('remembered_email');
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('remember').checked = true;
            }
        };

        async function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const remember = document.getElementById('remember').checked;
            const btn = document.getElementById('btn');

            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });

            if (error) {
                alert("Error: " + error.message);
                btn.innerText = "INGRESAR";
                btn.disabled = false;
                return;
            }

            if (remember) localStorage.setItem('remembered_email', email);
            else localStorage.removeItem('remembered_email');

            const { data: perfil } = await _supabase.from('perfiles').select('rol').eq('id', data.user.id).single();
            window.location.href = (perfil.rol === 'admin') ? 'admin.html' : 'sucursales.html';
        }
    </script>
</body>
</html>
