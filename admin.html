<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HeladOS - Panel Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <style>
        .menu-item { padding: 12px 20px; cursor: pointer; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; color: #94a3b8; font-weight: bold; transition: 0.3s; }
        .menu-item:hover { background: #334155; color: white; }
        .menu-item.active { background: #3b82f6; color: white; shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.5); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-slate-100 flex min-h-screen font-sans">
    <!-- Sidebar -->
    <div class="w-72 bg-slate-900 text-white p-6 flex flex-col shadow-2xl">
        <h2 class="text-3xl font-black mb-10 text-blue-400 italic tracking-tighter uppercase">Admin OS</h2>
        <nav>
            <div id="m-usuarios" onclick="nav('usuarios')" class="menu-item active">👥 Usuarios</div>
            <div id="m-sucursales" onclick="nav('sucursales')" class="menu-item">🏪 Sucursales</div>
            <div id="m-categorias" onclick="nav('categorias')" class="menu-item">📁 Categorías</div>
            <div id="m-sabores" onclick="nav('sabores')" class="menu-item">🍨 Sabores</div>
            <div id="m-precios" onclick="nav('precios')" class="menu-item">💰 Precios</div>
        </nav>
        <button onclick="handleLogout()" class="mt-auto text-red-400 font-bold p-4 rounded-xl hover:bg-red-500/10 transition">✕ Cerrar Sesión</button>
    </div>

    <!-- Main -->
    <div class="flex-1 p-10 overflow-y-auto">
        <div id="view-header" class="flex justify-between items-center mb-10"></div>
        <div id="view-content"></div>
    </div>

    <!-- Modal Form -->
    <div id="modal-form" class="modal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-lg shadow-2xl relative">
            <h3 id="modal-title" class="text-2xl font-black mb-6 text-slate-800 uppercase italic"></h3>
            <div id="modal-body" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2"></div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal()" class="px-5 font-bold text-slate-400">Cancelar</button>
                <button id="btn-save" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg">GUARDAR</button>
            </div>
        </div>
    </div>

    <script>
        let currentView = 'usuarios';

        async function nav(view) {
            currentView = view;
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.getElementById('m-' + view).classList.add('active');
            render();
        }

        async function render() {
            const content = document.getElementById('view-content');
            const header = document.getElementById('view-header');
            
            if (currentView === 'usuarios') {
                header.innerHTML = `<h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase">Usuarios y Permisos</h1>`;
                const { data: users } = await _supabase.from('perfiles').select('*');
                const { data: sucs } = await _supabase.from('sucursales').select('*');
                const { data: vinc } = await _supabase.from('usuario_sucursales').select('*');

                content.innerHTML = `<div class="grid gap-4">${users.map(u => {
                    const misSucs = vinc.filter(v => v.usuario_id === u.id).map(v => sucs.find(s => s.id === v.sucursal_id)?.nombre || '');
                    return `
                    <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 ${u.rol === 'admin' ? 'border-amber-400' : 'border-emerald-400'} flex justify-between items-center">
                        <div>
                            <span class="font-black text-slate-700 text-xl uppercase italic">${u.username}</span>
                            <span class="ml-2 text-xs font-bold bg-slate-100 px-2 py-1 rounded text-slate-500 uppercase">${u.rol}</span>
                            <p class="text-sm text-slate-400 font-bold mt-1">Acceso a: ${misSucs.join(', ') || 'NADA'}</p>
                        </div>
                        <button onclick='editAccess("${u.id}", "${u.username}")' class="bg-slate-900 text-white px-5 py-2 rounded-xl font-bold text-xs uppercase tracking-widest">Gestionar Accesos</button>
                    </div>`;
                }).join('')}</div>`;
            }

            if (currentView === 'sucursales') {
                header.innerHTML = `<h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase">Sucursales</h1><button onclick="openSucursalModal()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">+ Nueva</button>`;
                const { data: sucs } = await _supabase.from('sucursales').select('*');
                content.innerHTML = `<div class="grid grid-cols-2 gap-4">${sucs.map(s => `
                    <div class="bg-white p-6 rounded-3xl shadow-sm border-t-8 border-blue-500">
                        <p class="font-black text-slate-800 text-xl uppercase">${s.nombre}</p>
                        <p class="text-xs text-slate-400 font-bold">ID: ${s.id_texto}</p>
                    </div>`).join('')}</div>`;
            }
        }

        async function editAccess(userId, name) {
            const { data: sucs } = await _supabase.from('sucursales').select('*');
            const { data: vinc } = await _supabase.from('usuario_sucursales').select('sucursal_id').eq('usuario_id', userId);
            const checkIds = vinc.map(v => v.sucursal_id);

            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "Accesos: " + name;
            
            body.innerHTML = sucs.map(s => `
                <label class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100 transition">
                    <input type="checkbox" class="suc-check w-6 h-6 rounded-lg text-blue-600" value="${s.id}" ${checkIds.includes(s.id) ? 'checked' : ''}>
                    <span class="font-black text-slate-700 uppercase italic">${s.nombre}</span>
                </label>
            `).join('');

            document.getElementById('modal-form').classList.add('active');
            document.getElementById('btn-save').onclick = async () => {
                const selected = Array.from(document.querySelectorAll('.suc-check:checked')).map(c => c.value);
                await _supabase.from('usuario_sucursales').delete().eq('usuario_id', userId);
                if (selected.length > 0) {
                    await _supabase.from('usuario_sucursales').insert(selected.map(sid => ({ usuario_id: userId, sucursal_id: sid })));
                }
                closeModal(); render();
            };
        }

        function closeModal() { document.getElementById('modal-form').classList.remove('active'); }
        nav('usuarios');
    </script>
</body>
</html>
