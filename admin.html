<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HeladOS 1.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .sidebar { background: #0f172a; width: 280px; height: 100vh; position: fixed; color: white; z-index: 50; }
        .main { margin-left: 280px; padding: 40px; min-height: 100vh; }
        .menu-item { padding: 12px 20px; cursor: pointer; border-radius: 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; color: #94a3b8; font-weight: bold; transition: 0.3s; }
        .menu-item:hover { background: #1e293b; color: white; }
        .menu-item.active { background: #3b82f6; color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <div class="sidebar p-6 flex flex-col">
        <h2 class="text-2xl font-black mb-10 text-blue-400 italic uppercase tracking-tighter text-center">Admin OS</h2>
        <nav>
            <div onclick="nav('usuarios')" id="m-usuarios" class="menu-item active">👥 Usuarios y Permisos</div>
            <div onclick="nav('sucursales')" id="m-sucursales" class="menu-item">🏪 Sucursales</div>
            <div onclick="nav('categorias')" id="m-categorias" class="menu-item">📁 Categorías</div>
            <div onclick="nav('sabores')" id="m-sabores" class="menu-item">🍨 Sabores</div>
            <div onclick="nav('precios')" id="m-precios" class="menu-item">💰 Precios</div>
        </nav>
        <button onclick="handleLogout()" class="mt-auto text-red-400 font-bold p-4 hover:bg-red-500/10 rounded-xl transition">✕ Cerrar Sesión</button>
    </div>

    <div class="main">
        <div id="view-header" class="flex justify-between items-center mb-10"></div>
        <div id="view-content"></div>
    </div>

    <div id="modal-form" class="modal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-lg shadow-2xl">
            <h3 id="modal-title" class="text-2xl font-black mb-6 text-slate-800 uppercase italic"></h3>
            <div id="modal-body" class="space-y-4"></div>
            <div class="flex justify-end gap-3 mt-8 border-t pt-6">
                <button onclick="closeModal()" class="px-5 font-bold text-slate-400">Cancelar</button>
                <button id="btn-save" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700">GUARDAR</button>
            </div>
        </div>
    </div>

    <script>
        let currentView = 'usuarios';

        async function nav(view) {
            currentView = view;
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.getElementById('m-' + view).classList.add('active');
            render();
        }

        async function render() {
            const content = document.getElementById('view-content');
            const header = document.getElementById('view-header');
            content.innerHTML = '<p class="text-slate-400 font-bold">Cargando...</p>';

            if (currentView === 'usuarios') {
                header.innerHTML = `<h1 class="text-4xl font-black text-slate-800 uppercase italic tracking-tighter">Gestión de Usuarios</h1>
                                   <button onclick="abrirModalUsuario()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">+ Crear Usuario</button>`;
                
                const { data: users } = await _supabase.from('perfiles').select('*');
                const { data: sucs } = await _supabase.from('sucursales').select('*');
                const { data: vinc } = await _supabase.from('usuario_sucursales').select('*');

                content.innerHTML = `<div class="grid gap-4">${users.map(u => {
                    const misSucs = vinc.filter(v => v.usuario_id === u.id).map(v => sucs.find(s => s.id === v.sucursal_id)?.nombre || '');
                    return `
                    <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 ${u.rol === 'admin' ? 'border-amber-400' : 'border-emerald-400'} flex justify-between items-center">
                        <div>
                            <span class="font-black text-slate-700 text-xl uppercase italic">${u.username}</span>
                            <span class="ml-2 text-xs font-bold bg-slate-100 px-2 py-1 rounded text-slate-500 uppercase">${u.rol}</span>
                            <p class="text-xs text-slate-400 font-bold mt-1 uppercase">Accesos: ${misSucs.join(', ') || 'Sin Sucursales'}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick='gestionarAccesos("${u.id}", "${u.username}")' class="bg-slate-900 text-white px-4 py-2 rounded-xl font-bold text-[10px] uppercase">Permisos</button>
                            <button onclick='abrirModalUsuario(${JSON.stringify(u)})' class="bg-blue-100 text-blue-600 px-4 py-2 rounded-xl font-bold text-[10px] uppercase italic">Editar</button>
                            <button onclick="eliminar('perfiles','${u.id}')" class="text-red-300 font-bold text-[10px] px-2">Borrar</button>
                        </div>
                    </div>`;
                }).join('')}</div>`;
            }

            // --- LAS DEMÁS VISTAS (Categorías, Sabores, etc.) VAN AQUÍ IGUAL QUE ANTES ---
            if (currentView === 'categorias') {
                header.innerHTML = `<h1 class="text-4xl font-black text-slate-800 uppercase italic tracking-tighter">Categorías</h1><button onclick="abrirModalCat()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">+ Nueva</button>`;
                const { data } = await _supabase.from('categorias').select('*').order('orden');
                content.innerHTML = `<div class="space-y-3">${data.map(c => `<div class="bg-white p-5 rounded-2xl shadow-sm flex justify-between border-l-8 border-blue-500 font-bold text-slate-700">${c.nombre} <div class="flex gap-4"><button onclick='abrirModalCat(${JSON.stringify(c)})' class="text-blue-500">Editar</button><button onclick="eliminar('categorias','${c.id}')" class="text-red-300">Borrar</button></div></div>`).join('')}</div>`;
            }
            
            // ... (Resto de funciones de Categorías/Sabores que ya tenías)
        }

        // --- ABML USUARIOS ---
        function abrirModalUsuario(u = null) {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = u ? "Editar Usuario" : "Nuevo Usuario";
            body.innerHTML = `
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Nombre de Usuario / Email</label>
                    <input id="u-name" value="${u?.username || ''}" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none focus:ring-2 ring-blue-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Rol del Sistema</label>
                    <select id="u-rol" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none focus:ring-2 ring-blue-500">
                        <option value="empleado" ${u?.rol === 'empleado' ? 'selected' : ''}>Empleado (Solo Stock)</option>
                        <option value="admin" ${u?.rol === 'admin' ? 'selected' : ''}>Administrador (Todo)</option>
                    </select>
                </div>
                ${!u ? `<div>
                    <label class="text-xs font-bold text-slate-400 uppercase">ID de Autenticación (UUID de Supabase)</label>
                    <input id="u-id" placeholder="Pega el ID de Authentication aquí" class="w-full border-2 p-4 rounded-2xl bg-slate-50 outline-none">
                    <p class="text-[10px] text-blue-500 mt-1 font-bold italic">* Primero crea el usuario en Supabase > Authentication y pega aquí su ID</p>
                </div>` : ''}
            `;
            document.getElementById('modal-form').classList.add('active');
            document.getElementById('btn-save').onclick = async () => {
                const row = { 
                    username: document.getElementById('u-name').value, 
                    rol: document.getElementById('u-rol').value 
                };
                if(u) {
                    await _supabase.from('perfiles').update(row).eq('id', u.id);
                } else {
                    row.id = document.getElementById('u-id').value;
                    await _supabase.from('perfiles').insert([row]);
                }
                closeModal(); render();
            };
        }

        // --- PERMISOS (VARIAS SUCURSALES) ---
        async function gestionarAccesos(userId, name) {
            const { data: sucs } = await _supabase.from('sucursales').select('*');
            const { data: vinc } = await _supabase.from('usuario_sucursales').select('sucursal_id').eq('usuario_id', userId);
            const checkIds = vinc.map(v => v.sucursal_id);
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "Sucursales de " + name;
            body.innerHTML = `<div class="space-y-2">${sucs.map(s => `
                <label class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100 transition">
                    <input type="checkbox" class="suc-check w-6 h-6 rounded-lg text-blue-600" value="${s.id}" ${checkIds.includes(s.id) ? 'checked' : ''}>
                    <span class="font-black text-slate-700 uppercase italic text-sm">${s.nombre}</span>
                </label>`).join('')}</div>`;
            document.getElementById('modal-form').classList.add('active');
            document.getElementById('btn-save').onclick = async () => {
                const selected = Array.from(document.querySelectorAll('.suc-check:checked')).map(c => c.value);
                await _supabase.from('usuario_sucursales').delete().eq('usuario_id', userId);
                if (selected.length > 0) await _supabase.from('usuario_sucursales').insert(selected.map(sid => ({ usuario_id: userId, sucursal_id: sid })));
                closeModal(); render();
            };
        }

        function closeModal() { document.getElementById('modal-form').classList.remove('active'); }
        async function eliminar(t, id) { if(confirm('¿Eliminar definitivamente?')) { await _supabase.from(t).delete().eq('id', id); render(); } }
        
        nav('usuarios');
    </script>
</body>
</html>
